<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetScribe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 280px;
      padding: 16px;
      background: #fff;
      color: #1a1a1a;
    }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    p.sub { font-size: 12px; color: #666; margin-bottom: 16px; }

    label { font-size: 12px; font-weight: 500; display: block; margin-bottom: 4px; }
    select {
      width: 100%; padding: 6px 8px; border-radius: 6px;
      border: 1px solid #ddd; font-size: 13px; margin-bottom: 14px;
      background: #fafafa;
    }

    .btn {
      width: 100%; padding: 9px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s;
    }
    #btn-start { background: #4f46e5; color: #fff; }
    #btn-start:hover { background: #4338ca; }
    #btn-stop  { background: #ef4444; color: #fff; display: none; }
    #btn-stop:hover  { background: #dc2626; }

    #status {
      margin-top: 12px; font-size: 12px; color: #555;
      display: flex; align-items: center; gap: 6px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #d1d5db; flex-shrink: 0;
    }
    .dot.live { background: #22c55e; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: .4; }
    }

    .open-link {
      display: block; text-align: center; margin-top: 14px;
      font-size: 12px; color: #4f46e5; text-decoration: none;
    }
    .open-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>🎙 MeetScribe</h1>
  <p class="sub">Multilingual lecture transcription</p>

  <label for="lang-select">Language</label>
  <select id="lang-select">
    <option value="auto">Auto-detect</option>
    <option value="en">English</option>
    <option value="tl">Tagalog (Filipino)</option>
    <option value="ceb">Cebuano</option>
  </select>

  <button class="btn" id="btn-start">Start transcription</button>
  <button class="btn" id="btn-stop">Stop transcription</button>

  <div id="status">
    <span class="dot" id="dot"></span>
    <span id="status-text">Idle</span>
  </div>

  <a class="open-link" href="http://localhost:8501" target="_blank">
    Open Streamlit dashboard →
  </a>

  <script src="popup.js"></script>
</body>
</html>
